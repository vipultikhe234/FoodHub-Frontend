<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApnaCart Admin | Enterprise Management</title>
  <link rel="icon" type="image/svg+xml" href="/apnacart-logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script>
    window.onerror = function (msg, url, line, col, error) {
      var errorDiv = document.createElement('div');
      errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:white;color:red;padding:40px;z-index:999999;font-family:sans-serif;box-sizing:border-box;overflow:auto;';
      errorDiv.innerHTML = '<h1>⚠️ System Execution Error</h1>' +
        '<p><b>Message:</b> ' + msg + '</p>' +
        '<p><b>Source:</b> ' + url + '</p>' +
        '<p><b>Position:</b> Line ' + line + ', Col ' + col + '</p>' +
        '<hr/><pre>' + (error ? error.stack : 'No stack trace available') + '</pre>';
      document.body.appendChild(errorDiv);
    };
  </script>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
